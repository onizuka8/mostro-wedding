<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial - Caricamento...</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="tutorial-page">
    <header class="tutorial-header">
        <button class="back-button" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            <span class="back-button-label">Torna ai giochi</span>
        </button>
        <h1 id="gameTitle">Caricamento...</h1>
    </header>

    <main class="tutorial-content">
        <section class="tutorial-video">
            <div class="video-container">
                <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="game-info">
            <div class="game-meta-bar">
                <span class="meta-chip" id="metaDuration">
                    <i class="fas fa-clock"></i>
                    <span>—</span>
                </span>
                <span class="meta-chip" id="metaPlayers">
                    <i class="fas fa-users"></i>
                    <span>—</span>
                </span>
                <span class="meta-chip" id="metaCategory">
                    <i class="fas fa-puzzle-piece"></i>
                    <span>—</span>
                </span>
            </div>
            <p class="game-description-text" id="gameDescription">Caricamento...</p>
        </section>
    </main>

    <footer class="footer tutorial-footer">
        <p>Fatto con ❤️ per il nostro giorno speciale</p>
    </footer>

    <script src="games.js"></script>
    <script>
        function setMetaChip(id, text) {
            const chip = document.getElementById(id);
            const icon = chip.querySelector('i').outerHTML;
            chip.innerHTML = `${icon}<span>${text}</span>`;
        }

        function loadGameData() {
            const urlParams = new URLSearchParams(window.location.search);
            const gameId = urlParams.get('game');
            const gameSlug = urlParams.get('slug');

            let game = null;

            if (gameId) {
                game = games.find(g => g.id == gameId);
            } else if (gameSlug) {
                game = games.find(g =>
                    g.title.toLowerCase().replace(/[^a-z0-9]/g, '-') === gameSlug.toLowerCase()
                );
            }

            if (game) {
                document.title = `${game.title} - Tutorial`;
                document.getElementById('gameTitle').textContent = game.title;
                document.getElementById('videoFrame').src = game.youtubeUrl;
                document.getElementById('gameDescription').textContent = game.description;
                setMetaChip('metaDuration', game.duration);
                setMetaChip('metaPlayers', game.players);
                setMetaChip('metaCategory', game.category);
            } else {
                document.title = 'Gioco non trovato';
                document.getElementById('gameTitle').textContent = 'Gioco non trovato';
                document.getElementById('gameDescription').textContent = 'Il tutorial richiesto non è stato trovato.';
                document.querySelector('.game-meta-bar').style.display = 'none';
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', loadGameData);
    </script>
</body>

</html>
